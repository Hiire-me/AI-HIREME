<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sign In — AutoJobAgent</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>

<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-name">AutoJobAgent</div>
      </div>
      <div class="auth-subtitle">Sign in to your autonomous job search dashboard</div>

      {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
      <div class="flash flash-{{ cat }}">{{ msg }}</div>
      {% endfor %}
      {% endwith %}

      <form id="login-form">
        <div class="form-group">
          <label class="form-label">EMAIL ADDRESS</label>
          <input type="email" id="email" class="form-control" placeholder="you@example.com" required autofocus />
        </div>
        <div class="form-group">
          <label class="form-label">PASSWORD</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%; margin-top:6px;" id="btn-login">
          Sign In
        </button>
      </form>

      <div class="auth-divider">or</div>
      <button type="button" class="btn btn-lg"
        style="width:100%; background-color:#fff; color:#333; border:1px solid #ddd; margin-bottom:15px; display:flex; align-items:center; justify-content:center; gap:10px;"
        id="btn-google">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" height="18"
          alt="Google">
        Continue with Google
      </button>

      <p style="text-align:center;font-size:13px;color:var(--text-3);">
        Don't have an account?
        <a href="{{ url_for('auth.register') }}" class="auth-link">Create one free →</a>
      </p>
    </div>
  </div>

  <script type="module" src="{{ url_for('static', filename='js/firebase-auth.js') }}"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // It might take a moment for the module to load, so check on submit
      const loginForm = document.getElementById('login-form');
      const btnGoogle = document.getElementById('btn-google');
      const btnLogin = document.getElementById('btn-login');

      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        if (!window.signInWithEmailAndPassword) return;

        try {
          btnLogin.textContent = 'Signing in...';
          btnLogin.disabled = true;

          const userCredential = await window.signInWithEmailAndPassword(window.firebaseAuth, email, password);
          const idToken = await userCredential.user.getIdToken();

          await window.sendTokenToBackend(idToken);
        } catch (error) {
          btnLogin.textContent = 'Sign In';
          btnLogin.disabled = false;
          window.showError(error.message);
        }
      });

      btnGoogle.addEventListener('click', async () => {
        if (!window.signInWithPopup) return;

        try {
          btnGoogle.disabled = true;
          const userCredential = await window.signInWithPopup(window.firebaseAuth, window.googleProvider);
          const idToken = await userCredential.user.getIdToken();

          btnGoogle.textContent = 'Authenticating...';
          await window.sendTokenToBackend(idToken);
        } catch (error) {
          btnGoogle.disabled = false;
          if (error.code !== 'auth/popup-closed-by-user') {
            window.showError(error.message);
          }
        }
      });
    });
  </script>
</body>

</html>
